<!DOCTYPE html>
<html lang="ru">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
        rel="icon"
        href="{{ url_for('static', filename='icon.png') }}"
    >

    <title>Погода</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body {
            background: linear-gradient(135deg, #dbeafe, #f0f9ff);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .weather-card {
            max-width: 550px;
            margin: auto;
            border: none;
            border-radius: 28px;
            overflow: hidden;
            background: white;
        }

        .top-block {
            background: linear-gradient(135deg, #4f8cff, #7db8ff);
            color: white;
            padding: 35px 20px;
        }

        .title-icon {
            width: 52px;
            margin-bottom: 10px;
        }

        .temp {
            font-size: 78px;
            font-weight: bold;
            line-height: 1;
        }

        .city {
            font-size: 28px;
            font-weight: 600;
        }

        .weather-info {
            padding: 25px;
        }

        .info-card {
            background: #f8fafc;
            border-radius: 18px;
            padding: 18px;
            transition: 0.2s;
        }

        .info-card:hover {
            transform: translateY(-3px);
        }

        .info-icon {
            width: 32px;
            margin-bottom: 10px;
        }

        .coords {
            margin-top: 25px;
            font-size: 15px;
            color: #6b7280;
        }

        .coords img {
            width: 18px;
            margin-right: 5px;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="card shadow-lg weather-card">

        <div class="top-block text-center">

            <img
                src="/static/sun.png"
                class="title-icon"
            >

            <h1 class="mb-3">
                Погода
            </h1>

            <div class="city">
                {{ city }}
            </div>

            <div class="temp">
                {{ temp }}°
            </div>

        </div>

        <div class="weather-info">

            <div class="row g-3 text-center">

                <div class="col-6">

                    <div class="info-card h-100">

                        <img
                            src="/static/water.png"
                            class="info-icon"
                        >

                        <h5>
                            Влажность
                        </h5>

                        <p class="mb-0">
                            {{ humidity }}
                        </p>

                    </div>

                </div>

                <div class="col-6">

                    <div class="info-card h-100">

                        <img
                            src="/static/cloud.png"
                            class="info-icon"
                        >

                        <h5>
                            Облачность
                        </h5>

                        <p class="mb-0">
                            {{ cloudiness }}
                        </p>

                    </div>

                </div>

            </div>

            <div class="coords text-center">

                <img src="/static/round_pushpin.png">

                {{ lat }}, {{ lon }}

            </div>

            {% if error %}
                <div class="alert alert-danger mt-4">
                    {{ error }}
                </div>
            {% endif %}

        </div>

    </div>

</div>

</body>
</html>
